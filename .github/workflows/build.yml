name: WebOS build
on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_ENV_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/environment-setup
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build

  CCACHE_DIR: .ccache-build
  CCACHE_COMPRESS: true
  CCACHE_COMPRESSLEVEL: 6
  CCACHE_MAXSIZE: 600M

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hyperion.ng

    steps:
      - uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: master
          path: hyperion.ng
          submodules: recursive
          fetch-depth: 0

      - name: Restore/Cache build directories
        uses: actions/cache@v3
        with:
          path: ${{ github.workspace }}/${{ env.CCACHE_CACHE_DIR }}
          key: ccache-${{ runner.os }}-${{github.run_id}}
          restore-keys: |
            ccache-${{ runner.os }}

      - name: Restore/Cache toolchain dir
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.TOOLCHAIN_DIR }}
            ${{ env.QT_DIR }}

          key: ${{ runner.os }}-${{ env.TOOLCHAIN_URL }}

      - name: Create build directories
        run: |
          mkdir -p ./${{ env.BUILD_DIR }}

      - name: Download and unpack toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        working-directory: /opt
        run: |
          wget -q -O toolchain.tar.gz ${TOOLCHAIN_URL}
          tar xf toolchain.tar.gz

      - name: Relocate toolchain
        run: |
          pushd ${TOOLCHAIN_DIR}
          ./relocate-sdk.sh
          popd

      - name: Fix toolchain (remove perl)
        run: |
          find ${TOOLCHAIN_DIR}/bin -type f -iname "perl*" -delete

      - name: Set up host QT Toolchain path
        run: |
          echo "QT_TOOLCHAIN_DIR=$TOOLCHAIN_DIR/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV

      - name: Install native dependencies
        env:
          apt_deps: ccache git cmake build-essential flatbuffers-compiler
        run: |
          sudo apt update
          sudo apt install -y ${{ env.apt_deps }}

      - name: "Build QT"
############################################
#                BUILD QT                  #
############################################

qt_version="6.8.3"

required_version="3.27.7"
current_version=$(cmake --version | head -n1 | awk '{print $3}' | sed 's/[^0-9.].*$//')
if [ "$(printf '%s\n' "$current_version" "$required_version" | sort -V | head -n1)" != "$required_version" ]; then
  echo "CMake version $current_version is older than $required_version"
  build_option_qt="-no-sbom"
  build_option_qt_serial="-DQT_GENERATE_SBOM=OFF"
else
  echo "CMake version is $current_version. SBOM is supported."
fi

git clone --branch v${qt_version} --depth 1 https://github.com/qt/qtbase.git qt_lts
mkdir qt_build
cd qt_build

############################################
#        FIXED QT CONFIGURATION            #
############################################

../qt_lts/configure \
-prefix /usr \
-bindir /usr/qt_${qt_version}_bin \
-headerdir /usr/qt_${qt_version}_include \
-hostdatadir /usr/qt_${qt_version}_host \
-archdatadir /usr/qt_${qt_version} \
-datadir /usr/qt_${qt_version} \
-submodules qtbase,qtnetwork,qtsql,qtwebsockets \
${build_option_qt} \
-no-icu \
-nomake tests \
-nomake examples

if [ "$?" -ne "0" ]; then
  echo "Qt configuration failed"
  exit 1
fi

cmake --build . --parallel
if [ "$?" -ne "0" ]; then
  echo "Qt build failed"
  exit 1
fi

cmake --install .
if [ "$?" -ne "0" ]; then
  echo "Qt install failed"
  exit 1
fi

############################################
#         BUILD QT SERIALPORT              #
############################################

rm -rf *
git clone --branch v${qt_version} --depth 1 https://github.com/qt/qtserialport.git qtserialport

cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ${build_option_qt_serial} ./qtserialport
if [ "$?" -ne "0" ]; then
  echo "Qt serial configuration failed"
  exit 1
fi

cmake --build . --parallel
if [ "$?" -ne "0" ]; then
  echo "Qt serialport build failed"
  exit 1
fi

cmake --install .
if [ "$?" -ne "0" ]; then
  echo "Qt serialport install failed"
  exit 1
fi

############################################
#         BUILD QT WEBSOCKETS              #
############################################

rm -rf *
git clone --branch v${qt_version} --depth 1 https://github.com/qt/qtwebsockets.git qtwebsockets

cmake -G Ninja -DCMAKE_BUILD_TYPE=Release ${build_option_qt_serial} ./qtwebsockets
if [ "$?" -ne "0" ]; then
  echo "Qt websockets configuration failed"
  exit 1
fi

cmake --build . --parallel
if [ "$?" -ne "0" ]; then
  echo "Qt websockets build failed"
  exit 1
fi

cmake --install .
if [ "$?" -ne "0" ]; then
  echo "Qt websockets install failed"
  exit 1
fi

cd ..
rm -rf qt_lts
if [ "$?" -ne "0" ]; then
  echo "Qt clean failed (1)"
  exit 1
fi

rm -rf qt_build
if [ "$?" -ne "0" ]; then
  echo "Qt clean failed (2)"
  exit 1
fi

############################################
#              BUILD CCACHE                #
############################################

ccache_version="4.11.3"

mkdir ccache
cd ccache

wget "https://github.com/ccache/ccache/releases/download/v${ccache_version}/ccache-${ccache_version}.tar.gz"
if [ "$?" -ne "0" ]; then
  echo "Could not download ccache sources"
  exit 1
fi

tar -zxvf "ccache-${ccache_version}.tar.gz"
if [ "$?" -ne "0" ]; then
  echo "Extracting of ccache failed"
  exit 1
fi

cd "ccache-${ccache_version}"
if [ "$?" -ne "0" ]; then
  echo "Missing ccache folder"
  exit 1
fi

mkdir build
cd build

cmake -DHIREDIS_FROM_INTERNET=ON -DCMAKE_BUILD_TYPE=Release ..
if [ "$?" -ne "0" ]; then
  echo "CMake config failed"
  exit 1
fi

make -j $(nproc)
if [ "$?" -ne "0" ]; then
  echo "Make failed"
  exit 1
fi

make install
if [ "$?" -ne "0" ]; then
  echo "Make install failed"
  exit 1
fi

cd ../../..
rm -rf ccache
if [ "$?" -ne "0" ]; then
  echo "Clean up failed"
  exit 1
fi

      - name: Build (webos arm)
        env:
          CCACHE_DIR: ${{ github.workspace }}/${{ env.CCACHE_CACHE_DIR }}
        run: |
          pushd ./${{ env.BUILD_DIR }}
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DPython3_EXECUTABLE="${TOOLCHAIN_DIR}/bin/python3" \
            -DQt6_DIR=${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/lib/cmake/Qt6 \
            -DQt6HostInfo_DIR=$QT_TOOLCHAIN_DIR/lib/cmake/Qt6HostInfo \
            -DQt6CoreTools_DIR=$QT_TOOLCHAIN_DIR/lib/cmake/Qt6CoreTools \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=rpi \
            -DENABLE_DEV_FTDI=ON \
            -DHYPERION_LIGHT=ON \
            -DENABLE_REMOTE_CTL=ON \
            -DENABLE_QT=OFF \
            -DENABLE_AUDIO=OFF \
            -DENABLE_EFFECTENGINE=ON \
            -DENABLE_JSONCHECKS=ON \
            -DENABLE_DEV_SERIAL=ON \
            -DENABLE_DEV_USB_HID=ON \
            -DENABLE_DEV_WS281XPWM=OFF \
            -DENABLE_DEV_TINKERFORGE=ON \
            -DENABLE_MDNS=ON \
            -DENABLE_DEPLOY_DEPENDENCIES=OFF \
            -DENABLE_BOBLIGHT_SERVER=ON \
            -DENABLE_FLATBUF_SERVER=ON \
            -DENABLE_PROTOBUF_SERVER=OFF \
            -DENABLE_FORWARDER=ON \
            -DENABLE_FLATBUF_CONNECT=ON \
            -G Ninja
          cmake --build .
          popd

      - name: Copy built binaries to release/
        run: |
          rm -rf ./release
          cp -r -T -- "./${{ env.BUILD_DIR }}/bin" ./release
          find ./release

      - name: Copy dependencies to release/
        env:
          dependency_libs: libpython3.10.so.1.0 libQt6Core.so.6 libQt6Network.so.6 libQtDBus.so.6 libQt6SerialPort.so.6 libpng16.so.16 libjpeg.so.8 libcrypt.so.1 libcrypto.so.1.1 libz.so.1 libssl.so.1.1 libpcre2-16.so.0 libQt6Gui.so.6 libQt6Widgets.so.6 libk5crypto.so.3 libatomic.so.1 libkrb5support.so.0 libcom_err.so.3 libstdc++.so.6 libkrb5.so.3 libQt6Sql.so.6 libgssapi_krb5.so.2 libQt6WebSockets.so.6 libusb-1.0.so.0 libftdi1.so.2 libudev.so.1

        run: |
          for i in ${{ env.dependency_libs }}; do find -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/" -name "${i}" -exec cp -t ./release -- {} \;; done
          mkdir -p ./release/sqldrivers
          mkdir -p ./release/imageformats
          mkdir -p ./release/python/lib
          cp -t ./release/sqldrivers -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/qt/plugins/sqldrivers/libqsqlite.so"
          cp -t ./release/imageformats -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/qt/plugins/imageformats/libqico.so"
          cp -t ./release/imageformats -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/qt/plugins/imageformats/libqjpeg.so"
          cp -r -t ./release/python/lib -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/python3.10"
          find ./release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-build
          path: ${{ github.workspace }}/hyperion.ng/release/*
          if-no-files-found: error

  build_ipk:
    runs-on: ubuntu-latest
    needs: build_hyperion_ng

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/download-artifact@v4
        with:
          name: hyperion.ng-build
          path: hyperion.ng-build

      - name: Display structure of downloaded files
        run: ls -R

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14.x

      - name: Restore toolchain cache
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-${{ env.TOOLCHAIN_URL }}

      - name: Install native dependencies
        env:
          apt_deps: cmake build-essential
        run: |
          sudo apt update
          sudo apt install -y ${{ env.apt_deps }}

      - name: Reconfigure git to use HTTP authentication
        run: >
          git config --global url."https://github.com/".insteadOf
          ssh://git@github.com/

      - run: npm install
      - run: npm run lint
      - run: npm run build -- --env production
      - name: Build service
        run: |
          mkdir -p ./service/build
          pushd ./service/build
          cmake .. \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}"
          make
          popd
          mkdir -p ./dist
          rm -rf ./dist/service
          cp -r -T -- ./service/build/dist ./dist/service

      - name: Copy hyperion.ng into dist/service/hyperion
        run: |
          ls -R
          rm -rf ./dist/service/hyperion
          cp -r -T ./hyperion.ng-build ./dist/service/hyperion
          rm -f ./dist/service/hyperion/flatc
          ls -R

      - name: Ensure executables +x
        run: |
          chmod +x ./dist/service/autostart.sh
          chmod +x ./dist/service/loader_service
          chmod +x ./dist/service/start_hyperiond

          chmod +x ./dist/service/hyperion/hyperiond
          chmod +x ./dist/service/hyperion/hyperion-remote

      - run: npm run package
      - run: npm run gen-manifest

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-ipk
          path: |
            ${{github.workspace}}/*.ipk

      - uses: marvinpinto/action-automatic-releases@latest
        if: "github.ref == 'refs/heads/master'"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: latest
          prerelease: true
          title: "Development Build"
          files: |
            ${{github.workspace}}/*.ipk
            ${{github.workspace}}/org.webosbrew.hyperion.ng.loader.manifest.json

      - uses: marvinpinto/action-automatic-releases@latest
        if: "startsWith(github.ref, 'refs/tags/v')"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          prerelease: false
          title: ${{ github.ref_name }}
          files: |
            ${{github.workspace}}/*.ipk
            ${{github.workspace}}/org.webosbrew.hyperion.ng.loader.manifest.json
