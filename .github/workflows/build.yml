name: Hyperion NG webOS Qt6 STABLE FINAL

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_ENV_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/environment-setup
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake

  QT_VERSION: "6.8.3"
  QT_HOST_PREFIX: /opt/qt6-host
  QT_ARM_PREFIX: /opt/qt6-arm

  BUILD_DIR: build
  RELEASE_DIR: release

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

# -------------------------------------------------------
# SYSTEM DEPENDENCIES (NO clang traps anymore)
# -------------------------------------------------------
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build git perl python3 pkg-config \
            ccache libegl1-mesa-dev libgles2-mesa-dev \
            clang libclang-dev llvm-dev \
            dpkg-dev wget

# -------------------------------------------------------
# TOOLCHAIN
# -------------------------------------------------------
      - name: Cache toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: webos-toolchain

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          cd /opt
          wget -q -O toolchain.tar.gz "${TOOLCHAIN_URL}"
          sudo tar xf toolchain.tar.gz
          cd ${TOOLCHAIN_DIR}
          sudo ./relocate-sdk.sh

# -------------------------------------------------------
# QT SOURCE (FIXED ROOT CAUSE)
# -------------------------------------------------------
      - name: Fetch Qt6 source
        run: |
          git clone https://code.qt.io/qt/qt5.git qt6
          cd qt6
          git checkout v${QT_VERSION}
          perl init-repository

# -------------------------------------------------------
# HOST QT BUILD (CRITICAL FIX: NO clang tools)
# -------------------------------------------------------
      - name: Build Qt6 HOST
        run: |
          cd qt6
          mkdir host-build
          cd host-build

          cmake .. \
            -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${QT_HOST_PREFIX} \
            \
            -DQT_BUILD_TOOLS=ON \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            \
            -DQT_FEATURE_gui=ON \
            -DQT_FEATURE_network=ON \
            -DQT_FEATURE_widgets=ON \
            -DQT_FEATURE_sql=ON \
            -DQT_FEATURE_dbus=ON \
            \
            -DQT_FEATURE_clang=OFF \
            -DQT_FEATURE_clangcpp=OFF

          cmake --build . --parallel
          cmake --install .

# -------------------------------------------------------
# ARM QT BUILD (Hyperion required modules)
# -------------------------------------------------------
      - name: Build Qt6 ARM
        run: |
          source ${TOOLCHAIN_ENV_FILE}

          cd qt6
          mkdir arm-build
          cd arm-build

          cmake .. \
            -GNinja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=${QT_ARM_PREFIX} \
            -DQT_HOST_PATH=${QT_HOST_PREFIX} \
            \
            -DQT_BUILD_TOOLS=OFF \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            \
            -DQT_FEATURE_core=ON \
            -DQT_FEATURE_gui=ON \
            -DQT_FEATURE_widgets=ON \
            -DQT_FEATURE_network=ON \
            -DQT_FEATURE_sql=ON \
            -DQT_FEATURE_serialport=ON \
            -DQT_FEATURE_websockets=ON \
            -DQT_FEATURE_dbus=ON \
            \
            -DQT_FEATURE_opengl=es2 \
            -DQT_FEATURE_egl=ON \
            -DQT_FEATURE_imageformat_jpeg=ON

          cmake --build . --parallel
          cmake --install .

# -------------------------------------------------------
# VERIFY QT (CRITICAL STABILITY CHECK)
# -------------------------------------------------------
      - name: Verify Qt6
        run: |
          set -e
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6Core/Qt6CoreConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6Gui/Qt6GuiConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6Widgets/Qt6WidgetsConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6Network/Qt6NetworkConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6SerialPort/Qt6SerialPortConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6WebSockets/Qt6WebSocketsConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6Sql/Qt6SqlConfig.cmake
          test -f ${QT_ARM_PREFIX}/lib/cmake/Qt6DBus/Qt6DBusConfig.cmake

# -------------------------------------------------------
# HYPERION BUILD
# -------------------------------------------------------
      - name: Checkout Hyperion NG
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          submodules: recursive

      - name: Build Hyperion NG
        run: |
          source ${TOOLCHAIN_ENV_FILE}

          mkdir -p ${BUILD_DIR}
          cd ${BUILD_DIR}

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_PREFIX_PATH=${QT_ARM_PREFIX} \
            -DCMAKE_BUILD_TYPE=Release \
            -DENABLE_QT=ON \
            -DENABLE_EFFECTENGINE=ON \
            -DENABLE_AUDIO=OFF \
            -G Ninja

          cmake --build .

# -------------------------------------------------------
# RELEASE PACKAGE
# -------------------------------------------------------
      - name: Prepare release
        run: |
          rm -rf ${RELEASE_DIR}
          mkdir -p ${RELEASE_DIR}

          cp ${BUILD_DIR}/bin/* ${RELEASE_DIR}/

          cp ${QT_ARM_PREFIX}/lib/libQt6*.so* ${RELEASE_DIR}/ || true

          mkdir -p ${RELEASE_DIR}/plugins/{platforms,imageformats,sqldrivers}

          cp ${QT_ARM_PREFIX}/plugins/imageformats/libqjpeg.so ${RELEASE_DIR}/plugins/imageformats/ || true
          cp ${QT_ARM_PREFIX}/plugins/sqldrivers/libqsqlite.so ${RELEASE_DIR}/plugins/sqldrivers/ || true

# -------------------------------------------------------
# AUTOSTART SCRIPT
# -------------------------------------------------------
      - name: Create autostart script
        run: |
          cat <<EOF > ${RELEASE_DIR}/start_hyperion.sh
          #!/bin/sh
          export LD_LIBRARY_PATH=\$(dirname \$0)
          export QT_PLUGIN_PATH=\$(dirname \$0)/plugins
          export QT_QPA_PLATFORM=linuxfb
          exec \$(dirname \$0)/hyperiond
          EOF

          chmod +x ${RELEASE_DIR}/start_hyperion.sh

# -------------------------------------------------------
# IPK BUILD
# -------------------------------------------------------
      - name: Build IPK
        run: |
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin/hyperion

          cp -r ${RELEASE_DIR}/* ipk/usr/bin/hyperion/

          cat <<EOF > ipk/CONTROL/control
          Package: hyperion
          Version: 1.0.0
          Architecture: armv7
          Maintainer: Hyperion Project
          Description: Hyperion NG Qt6 webOS build (stable)
          EOF

          dpkg-deb --build ipk hyperion-webos-qt6.ipk

# -------------------------------------------------------
# ARTIFACT
# -------------------------------------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-webos-qt6-stable
          path: |
            hyperion-webos-qt6.ipk
            release/
