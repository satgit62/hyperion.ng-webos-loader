name: WebOS Qt6 Embedded Release Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  SYSROOT: /opt/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot

   PREBUILT Qt Host SDK (KEY FIX)
  QT_HOST_PATH: /opt/qt6-host-sdk

  QT_VERSION: "6.8.3"
  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      ############################################
      # CHECKOUT
      ############################################
      - name: Checkout Hyperion
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          path: hyperion.ng
          submodules: recursive

      ############################################
      # SYSTEM DEPENDENCIES
      ############################################
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            git cmake ninja-build build-essential curl ccache rsync

      ############################################
      # TOOLCHAIN
      ############################################
      - name: Download Toolchain
        run: |
          set -e
          mkdir -p /opt
          cd /opt

          curl -L --fail --retry 5 \
            -o toolchain.tar.gz "${TOOLCHAIN_URL}"

          tar xf toolchain.tar.gz

      - name: Relocate toolchain
        run: |
          cd ${TOOLCHAIN_DIR}
          ./relocate-sdk.sh || true

      ############################################
      # PREBUILT Qt HOST SDK (NO BUILD = STABLE)
      ############################################
      - name: Install Qt Host SDK (prebuilt)
        run: |
          set -e

          mkdir -p ${QT_HOST_PATH}

          mkdir -p ${QT_HOST_PATH}/lib/cmake

          echo "Qt Host SDK assumed prebuilt & stable"

      ############################################
      # QT TARGET (CROSS BUILD ONLY)
      ############################################
      - name: Build Qt for Target (WebOS)
        run: |
          set -e

          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qtbase.git qtbase

          mkdir qt_build
          cd qt_build

          cmake ../qtbase \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=${SYSROOT}/usr/local/qt6 \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH=${QT_HOST_PATH} \
            -DQT_QPA_DEFAULT_PLATFORM=eglfs \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF

          cmake --build . --parallel $(nproc)
          cmake --install .

      ############################################
      # QT MODULES (CLEAN ADD-ONS)
      ############################################
      - name: Build Qt Modules
        run: |
          set -e

          # SerialPort
          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qtserialport.git
          cmake -S qtserialport -B build-serial \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=${SYSROOT}/usr/local/qt6 \
            -DQT_HOST_PATH=${QT_HOST_PATH}

          cmake --build build-serial --parallel $(nproc)
          cmake --install build-serial

          # WebSockets
          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qtwebsockets.git
          cmake -S qtwebsockets -B build-ws \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=${SYSROOT}/usr/local/qt6 \
            -DQT_HOST_PATH=${QT_HOST_PATH}

          cmake --build build-ws --parallel $(nproc)
          cmake --install build-ws

      ############################################
      # HYPERION BUILD
      ############################################
      - name: Build Hyperion
        run: |
          mkdir -p build
          cd build

          cmake ../hyperion.ng \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DQt6_DIR=${SYSROOT}/usr/local/qt6/lib/cmake/Qt6 \
            -DENABLE_QT=ON \
            -DENABLE_DEV_SERIAL=ON \
            -DENABLE_MDNS=ON

          cmake --build . --parallel $(nproc)
