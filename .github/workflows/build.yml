name: WebOS-Build (Qt6 Lean)
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build
  QT_VERSION: "6.8.3"
  CCACHE_DIR: ${{ github.workspace }}/.ccache

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperion.ng
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: master
          path: hyperion.ng
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git cmake build-essential flatbuffers-compiler ninja-build wget libdbus-1-dev

      - name: Set up Environment
        run: |        
          echo "QT_TOOLCHAIN_DIR=${{ env.TOOLCHAIN_DIR }}/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=${{ env.TOOLCHAIN_DIR }}/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ${{ runner.os }}-ccache-${{ github.sha }}
          restore-keys: ${{ runner.os }}-ccache-

      - name: Download and unpack toolchain      
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          wget -q -O toolchain.tar.gz ${{ env.TOOLCHAIN_URL }}
          tar xf toolchain.tar.gz -C /opt
          cd ${{ env.TOOLCHAIN_DIR }}
          ./relocate-sdk.sh
          rm -rf share/doc share/man
          find . -name "*.a" -type f -delete

      - name: "Build QT6 (Host & Cross)"
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          sudo chown -R $USER:$USER /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          git clone --branch v${QT_VERSION} --depth 1 https://github.com /opt/qt_build/qt_source
          
          mkdir -p /opt/qt_build/host && cd /opt/qt_build/host
          cmake /opt/qt_build/qt_source -DCMAKE_INSTALL_PREFIX=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_gui=OFF -DQT_FEATURE_opengl=OFF -DQT_FEATURE_dbus=ON -DQT_BUILD_TESTS=OFF -DQT_BUILD_EXAMPLES=OFF -GNinja
          ninja install

          cd /opt/qt_build/qt_source
          mkdir -p mkspecs/devices/linux-webos-g++
          cp -r ${{ env.TOOLCHAIN_DIR }}/mkspecs/devices/linux-buildroot-g++ mkspecs/devices/linux-webos-g++
          sed -i '1i#define EM_AARCH64 183' src/corelib/plugin/qelfparser_p.cpp
          sed -i 's/readOnly = (statfs_buf.f_flags \& ST_RDONLY) != 0;/readOnly = false;/' src/corelib/io/qstorageinfo_linux.cpp
                    
          mkdir -p /opt/qt_build/base_cross && cd /opt/qt_build/base_cross
          cmake /opt/qt_build/qt_source -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_INSTALL_PREFIX=/usr/local/qt6 -DCMAKE_STAGING_PREFIX=${{ env.SYSROOT }}/usr/local/qt6 -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_dbus=ON -DQT_FEATURE_gui=ON -DQT_FEATURE_widgets=ON -DQT_FEATURE_opengl=OFF -GNinja -DQt6CoreTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6CoreTools -DQt6DBusTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6DBusTools -DQt6WidgetsTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6WidgetsTools -DQt6GuiTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6GuiTools
          ninja install

          for mod in qtserialport qtwebsockets qtimageformats; do
            git clone --branch "v${QT_VERSION}" --depth 1 "https://github.com{mod}.git" "/opt/qt_build/${mod}"
            mkdir -p "/opt/qt_build/${mod}/build" && cd "/opt/qt_build/${mod}/build"
            cmake .. -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" -DCMAKE_INSTALL_PREFIX="/usr/local/qt6" -DCMAKE_STAGING_PREFIX="${{ env.SYSROOT }}/usr/local/qt6" -GNinja
            ninja install
          done

      - name: Build Hyperion
        run: |
          cd hyperion.ng
          # Patch anwenden
          sed -i '/using FramebufferWrapper = QObject;/d' src/hyperiond/hyperiond.h
          
          mkdir -p "${{ env.BUILD_DIR }}" && cd "${{ env.BUILD_DIR }}"
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" \
            -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" \
            -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
            -DPython3_EXECUTABLE="${{ env.TOOLCHAIN_DIR }}/bin/python3" \
            -DCMAKE_BUILD_TYPE=Release -DPLATFORM=rpi -DENABLE_QT=ON -DENABLE_CEC=OFF -DENABLE_DRM=OFF -DENABLE_DISPMANX=OFF -DENABLE_AUDIO=OFF -DENABLE_DEPLOY_DEPENDENCIES=OFF -GNinja
          ninja


      - name: "Staging: Copy binaries and dependencies"
        env:
          dependency_libs: >-
            libpython3.10.so.1.0 libpng16.so.16 libjpeg.so.8 libcrypt.so.1 libcrypto.so.1.1 
            libz.so.1 libssl.so.1.1 libpcre2-16.so.0 libk5crypto.so.3 libatomic.so.1 
            libkrb5support.so.0 libcom_err.so.3 libstdc++.so.6 libkrb5.so.3 
            libgssapi_krb5.so.2 libusb-1.0.so.0 libftdi1.so.2 libudev.so.1
          qt6_libs: >-
            libQt6Gui.so.6 libQt6Network.so.6 libQt6Widgets.so.6 libQt6Core.so.6 
            libQt6Sql.so.6 libQt6SerialPort.so.6 libQt6WebSockets.so.6
        run: |
          rm -rf ./release && mkdir -p ./release/sqldrivers ./release/imageformats ./release/python/lib
          # Binaries kopieren
          cp -r -T -- "./hyperion.ng/${{ env.BUILD_DIR }}/bin" ./release
          # System Libs flach kopieren (Suche im gesamten Sysroot)
          for i in ${{ env.dependency_libs }}; do 
            find "${{ env.SYSROOT }}/" -name "${i}" -exec cp -P -t ./release -- {} +; 
          done
          # Qt6 Libs flach kopieren
          for i in ${{ env.qt6_libs }}; do 
            find "${{ env.SYSROOT }}/usr/local/qt6/lib/" -name "${i}*" -exec cp -P -t ./release -- {} +; 
          done
          # Plugins & Python
          cp -P ${{ env.SYSROOT }}/usr/local/qt6/plugins/sqldrivers/libqsqlite.so ./release/sqldrivers/
          cp -P ${{ env.SYSROOT }}/usr/local/qt6/plugins/imageformats/libqico.so ./release/imageformats/
          cp -P ${{ env.SYSROOT }}/usr/local/qt6/plugins/imageformats/libqjpeg.so ./release/imageformats/
          cp -r -t ./release/python/lib -- "${{ env.SYSROOT }}/usr/lib/python3.10"/* 2>/dev/null || true
          ls -F ./release

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-webos-binaries
          path: ./release/*

  build_ipk:
    runs-on: ubuntu-latest
    needs: build_hyperion_ng
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: hyperion.ng-webos-binaries
          path: hyperion.ng-build
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 14.x
      - name: Restore toolchain cache
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}
      - run: npm install
      - run: npm run build -- --env production
      - name: Build service
        run: |
          mkdir -p ./service/build && cd ./service/build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}"
          make && cd ../..
          mkdir -p ./dist && rm -rf ./dist/service && cp -r -T -- ./service/build/dist ./dist/service
      - name: Copy hyperion.ng into dist/service/hyperion
        run: |
          rm -rf ./dist/service/hyperion && mkdir -p ./dist/service/hyperion
          # ARCHIV-Modus (-a) kopiert Symlinks korrekt als Symlinks!
          cp -a ./hyperion.ng-build/. ./dist/service/hyperion/
          rm -f ./dist/service/hyperion/flatc
      - name: Ensure executables +x
        run: |
          chmod +x ./dist/service/autostart.sh ./dist/service/loader_service ./dist/service/start_hyperiond
          chmod +x ./dist/service/hyperion/hyperiond ./dist/service/hyperion/hyperion-remote
          chmod -R +r ./dist/service/hyperion
      - run: npm run package
      - run: npm run gen-manifest
      - name: Upload IPK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-ipk
          path: ${{ github.workspace }}/*.ipk
