name: WebOS build (Qt6 Lean)
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.4/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_ENV_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/environment-setup
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build
  CCACHE_CACHE_DIR: .ccache-build
  QT_VERSION: "6.8.3"

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperion.ng
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: master
          path: hyperion.ng
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git cmake build-essential flatbuffers-compiler ninja-build wget

      - name: Set up Environment
        run: |        
          echo "QT_TOOLCHAIN_DIR=$TOOLCHAIN_DIR/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV

      - name: Cache toolchain dir
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-${{ env.TOOLCHAIN_URL }}

      - name: Download and unpack toolchain      
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          cd /opt
          wget -q -O toolchain.tar.gz ${{ env.TOOLCHAIN_URL }}
          tar xf toolchain.tar.gz
          cd ${{ env.TOOLCHAIN_DIR }}
          ./relocate-sdk.sh

      - name: "Build QT6 (Host & Cross)"
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/qt_build
          git clone --branch v${QT_VERSION} --depth 1 https://github.com /opt/qt_build/qt_source
          
          # --- HOST BUILD (für Tools wie uic, moc) ---
          mkdir -p /opt/qt_build/host && cd /opt/qt_build/host
          ../qt_source/configure -prefix ${{ env.QT_TOOLCHAIN_DIR }} -nomake tests -nomake examples \
            -gui -widgets -no-dbus -no-icu -no-opengl -no-feature-network -no-sql-sqlite
          cmake --build . --parallel $(nproc)
          cmake --install .

          # --- CROSS BUILD PREPARATION (Patches) ---
          cd /opt/qt_build/qt_source
          mkdir -p mkspecs/devices/linux-webos-g++
          cp -r ${{ env.TOOLCHAIN_DIR }}/mkspecs/devices/linux-buildroot-g++ mkspecs/devices/linux-webos-g++
          sed -i '1i#define EM_AARCH64 183' src/corelib/plugin/qelfparser_p.cpp
          
          # --- CROSS BUILD (ARMv7) ---
          mkdir -p /opt/qt_build/base && cd /opt/qt_build/base
          ../qt_source/configure \
            -prefix /usr/local/qt6 \
            -extprefix ${{ env.SYSROOT }}/usr/local/qt6 \
            -release -device linux-webos-g++ \
            -device-option CROSS_COMPILE=${{ env.TOOLCHAIN_DIR }}/bin/arm-webos-linux-gnueabi- \
            -qt-host-path ${{ env.QT_TOOLCHAIN_DIR }} \
            -nomake tests -nomake examples \
            -dbus-linked -gui -widgets -network -sql-sqlite -qt-sqlite -no-opengl \
            -- -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
            -DQt6CoreTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6CoreTools \
            -DQt6WidgetsTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6WidgetsTools \
            -DQt6GuiTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6GuiTools
          
          cmake --build . --parallel $(nproc)
          cmake --install .

          # --- ADD-ON MODULES ---
          for mod in qtserialport qtwebsockets qtimageformats; do
            git clone --branch v${QT_VERSION} --depth 1 https://github.com /opt/qt_build/$mod
            mkdir -p /opt/qt_build/$mod/build && cd /opt/qt_build/$mod/build
            cmake -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" \
                  -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" -DCMAKE_INSTALL_PREFIX="${{ env.SYSROOT }}/usr/local/qt6" ..
            cmake --build . --parallel $(nproc) && cmake --install .
          done

      - name: "Build Hyperion.ng"
        run: |
          mkdir -p hyperion.ng/${{ env.BUILD_DIR }}
          cd hyperion.ng/${{ env.BUILD_DIR }}
          cmake -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
                -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} \
                -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
                -DIMPORT_EXECUTABLES=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6CoreTools/Qt6CoreToolsConfig.cmake \
                -DBUILD_TESTS=OFF \
                -DPLATFORM=rpi \
                -DENABLE_DEV_FTDI=ON \
                -DHYPERION_LIGHT=ON \
                -DENABLE_REMOTE_CTL=ON \
                -DENABLE_QT=OFF \
                -DENABLE_AUDIO=OFF \
                -DENABLE_EFFECTENGINE=ON \
                -DENABLE_JSONCHECKS=ON \
                -DENABLE_DEV_SERIAL=ON \
                -DENABLE_DEV_USB_HID=ON \
                -DENABLE_DEV_WS281XPWM=OFF \
                -DENABLE_DEV_TINKERFORGE=ON \
                -DENABLE_MDNS=ON \
                -DENABLE_DEPLOY_DEPENDENCIES=OFF \
                -DENABLE_BOBLIGHT_SERVER=ON \
                -DENABLE_FLATBUF_SERVER=ON \
                -DENABLE_PROTOBUF_SERVER=OFF \
                -DENABLE_FORWARDER=ON \
                -DENABLE_FLATBUF_CONNECT=ON 
            cmake --build . --parallel $(nproc)	
          
          # Staging für das IPK
          make install DESTDIR=./output_staging
          mkdir -p ./output_staging/usr/local/share/hyperion/lib/plugins
          cp -P ${{ env.SYSROOT }}/usr/local/qt6/lib/libQt6*.so* ./output_staging/usr/local/share/hyperion/lib/
          cp -r ${{ env.SYSROOT }}/usr/local/qt6/plugins/* ./output_staging/usr/local/share/hyperion/lib/plugins/
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-build
          path: ${{ github.workspace }}/hyperion.ng/release/*
          if-no-files-found: error
