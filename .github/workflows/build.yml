name: WebOS-Build (Qt6 Lean)
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build
  QT_VERSION: "6.8.3"

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperion.ng
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: master
          path: hyperion.ng
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git cmake build-essential flatbuffers-compiler ninja-build wget libdbus-1-dev

      - name: Set up Environment
        run: |        
          echo "QT_TOOLCHAIN_DIR=${{ env.TOOLCHAIN_DIR }}/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=${{ env.TOOLCHAIN_DIR }}/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV

      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}

      - name: Download and unpack toolchain      
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          wget -q -O toolchain.tar.gz ${{ env.TOOLCHAIN_URL }}
          tar xf toolchain.tar.gz -C /opt
          cd ${{ env.TOOLCHAIN_DIR }}
          ./relocate-sdk.sh

      - name: "Build QT6 (Host & Cross)"
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          sudo chown -R $USER:$USER /opt/qt_build ${{ env.QT_TOOLCHAIN_DIR }}
          git clone --branch v${QT_VERSION} --depth 1 https://github.com/qt/qtbase.git /opt/qt_build/qt_source
          
          # 1. Host Build
          mkdir -p /opt/qt_build/host && cd /opt/qt_build/host
          cmake /opt/qt_build/qt_source -DCMAKE_INSTALL_PREFIX=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_gui=OFF -DQT_FEATURE_opengl=OFF -DQT_FEATURE_dbus=ON -DQT_BUILD_TESTS=OFF -DQT_BUILD_EXAMPLES=OFF -GNinja
          ninja install

          # 2. Preparation & Patches
          cd /opt/qt_build/qt_source
          mkdir -p mkspecs/devices/linux-webos-g++
          cp -r ${{ env.TOOLCHAIN_DIR }}/mkspecs/devices/linux-buildroot-g++ mkspecs/devices/linux-webos-g++
          sed -i '1i#define EM_AARCH64 183' src/corelib/plugin/qelfparser_p.cpp
          sed -i 's/readOnly = (statfs_buf.f_flags \& ST_RDONLY) != 0;/readOnly = false;/' src/corelib/io/qstorageinfo_linux.cpp
                    
          # 3. Cross Build
          mkdir -p /opt/qt_build/base_cross && cd /opt/qt_build/base_cross
          cmake /opt/qt_build/qt_source -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} -DCMAKE_INSTALL_PREFIX=/usr/local/qt6 -DCMAKE_STAGING_PREFIX=${{ env.SYSROOT }}/usr/local/qt6 -DCMAKE_BUILD_TYPE=Release -DQT_FEATURE_dbus=ON -DQT_FEATURE_gui=ON -DQT_FEATURE_widgets=ON -DQT_FEATURE_opengl=OFF -GNinja -DQt6CoreTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6CoreTools -DQt6DBusTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6DBusTools -DQt6WidgetsTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6WidgetsTools -DQt6GuiTools_DIR=${{ env.QT_TOOLCHAIN_DIR }}/lib/cmake/Qt6GuiTools
          ninja install

          # --- 4. ADD-ON MODULES ---
          for mod in qtserialport qtwebsockets qtimageformats; do
            echo "Building module: $mod"
            
            # KORREKTUR: Mit /qt/ Pfad und dem wichtigen $ Zeichen vor {mod}
            git clone --branch "v${QT_VERSION}" --depth 1 "https://github.com/qt/${mod}.git" "/opt/qt_build/${mod}"
            
            mkdir -p "/opt/qt_build/${mod}/build" && cd "/opt/qt_build/${mod}/build"
            
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE="${{ env.TOOLCHAIN_FILE }}" \
              -DQT_HOST_PATH="${{ env.QT_TOOLCHAIN_DIR }}" \
              -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
              -DCMAKE_INSTALL_PREFIX="/usr/local/qt6" \
              -DCMAKE_STAGING_PREFIX="${{ env.SYSROOT }}/usr/local/qt6" \
              -GNinja
            ninja install
          done




      - name: Build Hyperion
        env:
          CCACHE_DIR: ${{ github.workspace }}/${{ env.CCACHE_DIR }}
        run: |
          mkdir -p -- "./${{ env.BUILD_DIR }}"
          pushd -- "./${{ env.BUILD_DIR }}"
          cmake .. \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_TOOLCHAIN_FILE="${TOOLCHAIN_FILE}" \
            -DQT_HOST_PATH="${QT_TOOLCHAIN_DIR}" \
            -DCMAKE_PREFIX_PATH="${SYSROOT}/usr/local/qt6" \
            -DPython3_EXECUTABLE="${TOOLCHAIN_DIR}/bin/python3" \
            -DCMAKE_BUILD_TYPE=Release \
            -DPLATFORM=rpi \
            -DENABLE_QT=ON \
            -DENABLE_CEC=OFF \
            -DENABLE_DEV_FTDI=ON \
            -DHYPERION_LIGHT=ON \
            -DENABLE_REMOTE_CTL=ON \
            -DENABLE_AUDIO=OFF \
            -DENABLE_EFFECTENGINE=ON \
            -DENABLE_JSONCHECKS=ON \
            -DENABLE_DEV_SERIAL=ON \
            -DENABLE_DEV_USB_HID=ON \
            -DENABLE_DEV_WS281XPWM=OFF \
            -DENABLE_DEV_TINKERFORGE=ON \
            -DENABLE_MDNS=ON \
            -DENABLE_DEPLOY_DEPENDENCIES=OFF \
            -DENABLE_BOBLIGHT_SERVER=ON \
            -DENABLE_FLATBUF_SERVER=ON \
            -DENABLE_PROTOBUF_SERVER=OFF \
            -DENABLE_FORWARDER=ON \
            -DENABLE_FLATBUF_CONNECT=ON \
            -G Ninja
          ninja
          popd

      - name: Copy built binaries to release/
        run: |
          rm -rf ./release
          mkdir -p ./release
          cp -r -T -- "./${{ env.BUILD_DIR }}/bin" ./release
          find ./release

      - name: Copy dependencies to release/
        env:
          # Qt6 Bibliotheken haben die Endung .so.6
          dependency_libs: >-
            libpython3.10.so.1.0 libpng16.so.16 libjpeg.so.8 libcrypt.so.1 libcrypto.so.1.1 
            libz.so.1 libssl.so.1.1 libpcre2-16.so.0 libk5crypto.so.3 libatomic.so.1 
            libkrb5support.so.0 libcom_err.so.3 libstdc++.so.6 libkrb5.so.3 
            libgssapi_krb5.so.2 libusb-1.0.so.0 libftdi1.so.2 libudev.so.1
          qt6_libs: >-
            libQt6Gui.so.6 libQt6Network.so.6 libQt6Widgets.so.6 libQt6Core.so.6 
            libQt6Sql.so.6 libQt6SerialPort.so.6 libQt6WebSockets.so.6
        run: |
          mkdir -p ./release/lib/plugins/sqldrivers
          mkdir -p ./release/lib/plugins/imageformats
          mkdir -p ./release/python/lib

          # 1. Standard System-Abhängigkeiten kopieren
          for i in ${{ env.dependency_libs }}; do 
            find "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/" -name "${i}" -exec cp -P -t ./release/lib -- {} +; 
          done

          # 2. Qt6 Bibliotheken kopieren (aus unserem Custom-Pfad)
          for i in ${{ env.qt6_libs }}; do 
            find "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/lib/" -name "${i}*" -exec cp -P -t ./release/lib -- {} +; 
          done

          # 3. Qt6 Plugins kopieren
          cp -P ${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/plugins/sqldrivers/libqsqlite.so ./release/lib/plugins/sqldrivers/
          cp -P ${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/plugins/imageformats/libqico.so ./release/lib/plugins/imageformats/
          cp -P ${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/plugins/imageformats/libqjpeg.so ./release/lib/plugins/imageformats/

          # 4. Python Libs kopieren
          cp -r -t ./release/python/lib -- "${TOOLCHAIN_DIR}/arm-webos-linux-gnueabi/sysroot/usr/lib/python3.10"
          
          find ./release
