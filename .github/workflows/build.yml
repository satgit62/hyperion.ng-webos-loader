name: WebOS build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  QT_HOST_PATH: /opt/arm-webos-linux-gnueabi_sdk-buildroot/qt6-host
  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          path: hyperion.ng
          submodules: recursive

      ############################################
      # CACHE (TOOLCHAIN + QT)
      ############################################

      - name: Cache toolchain + Qt
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: |
            /opt/arm-webos-linux-gnueabi_sdk-buildroot
          key: webos-qt6-${{ runner.os }}-6.8.3-v3
          restore-keys: |
            webos-qt6-${{ runner.os }}

      ############################################
      # TOOLCHAIN DOWNLOAD (SAFE)
      ############################################

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p /opt
          cd /opt

          curl -L --fail --retry 5 --retry-delay 5 \
            -o toolchain.tar.gz "${TOOLCHAIN_URL}"

          file toolchain.tar.gz
          tar -tf toolchain.tar.gz > /dev/null
          tar xf toolchain.tar.gz

      - name: Relocate toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          cd ${TOOLCHAIN_DIR}
          ./relocate-sdk.sh

      ############################################
      # HOST DEPENDENCIES
      ############################################

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build build-essential curl ccache

      ############################################
      # QT BUILD (ONLY IF CACHE MISS)
      ############################################

      - name: Build Qt6
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -e
          qt_version="6.8.3"

          ########################################
          # HOST QT
          ########################################

          git clone --depth 1 --branch v${qt_version} https://github.com/qt/qtbase.git qtbase_host
          mkdir qt_host_build
          cd qt_host_build

          cmake ../qtbase_host \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$QT_HOST_PATH \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF

          cmake --build . --parallel $(nproc)
          cmake --install .

          cd ..

          ########################################
          # TARGET QT (WIDGETS + GUI ENABLED)
          ########################################

          git clone --depth 1 --branch v${qt_version} https://github.com/qt/qtbase.git qtbase_target
          mkdir qt_target_build
          cd qt_target_build

          cmake ../qtbase_target \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot/usr/local/qt6 \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DQT_HOST_PATH=$QT_HOST_PATH \
            -DQt6CoreTools_DIR=$QT_HOST_PATH/lib/cmake/Qt6CoreTools \
            -DQt6HostInfo_DIR=$QT_HOST_PATH/lib/cmake/Qt6HostInfo \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            -DINPUT_icu=no \
            -DQT_QPA_DEFAULT_PLATFORM=eglfs

          cmake --build . --parallel $(nproc)
          cmake --install .

      ############################################
      # QT MODULES
      ############################################

      - name: Build Qt Modules
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          set -e
          qt_version="6.8.3"

          # SerialPort
          git clone --depth 1 --branch v${qt_version} https://github.com/qt/qtserialport.git
          cmake -S qtserialport -B build-serial \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot/usr/local/qt6 \
            -DQT_HOST_PATH=$QT_HOST_PATH

          cmake --build build-serial --parallel $(nproc)
          cmake --install build-serial

          # WebSockets
          git clone --depth 1 --branch v${qt_version} https://github.com/qt/qtwebsockets.git
          cmake -S qtwebsockets -B build-ws \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_INSTALL_PREFIX=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot/usr/local/qt6 \
            -DQT_HOST_PATH=$QT_HOST_PATH

          cmake --build build-ws --parallel $(nproc)
          cmake --install build-ws

      ############################################
      # BUILD PROJECT
      ############################################

      - name: Build Hyperion
        run: |
          mkdir -p build
          cd build

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DQt6_DIR=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot/usr/local/qt6/lib/cmake/Qt6 \
            -DQt6CoreTools_DIR=$QT_HOST_PATH/lib/cmake/Qt6CoreTools \
            -DQt6HostInfo_DIR=$QT_HOST_PATH/lib/cmake/Qt6HostInfo \
            -DENABLE_QT=ON \
            -DENABLE_DEV_SERIAL=ON \
            -G Ninja

          cmake --build . --parallel $(nproc)
