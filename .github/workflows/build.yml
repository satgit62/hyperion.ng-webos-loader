name: WebOS Qt6 Embedded Deterministic Pipeline

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake

  SYSROOT: /opt/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot

  QT_VERSION: "6.8.3"
  QT_HOST_DIR: /opt/qt6-host

  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    ############################################
    # CHECKOUT
    ############################################
    - name: Checkout Hyperion
      uses: actions/checkout@v4
      with:
        repository: hyperion-project/hyperion.ng
        path: hyperion.ng
        submodules: recursive

    ############################################
    # SYSTEM DEPENDENCIES
    ############################################
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
          git cmake ninja-build build-essential curl ccache zstd

    ############################################
    # TOOLCHAIN
    ############################################
    - name: Download Toolchain
      run: |
        set -e
        mkdir -p /opt
        cd /opt

        curl -L --fail --retry 5 -o toolchain.tar.gz "${TOOLCHAIN_URL}"
        tar xf toolchain.tar.gz

    - name: Relocate toolchain
      run: |
        cd ${TOOLCHAIN_DIR}
        ./relocate-sdk.sh || true

    ############################################
    # RESTORE Qt HOST SDK (NO BUILD!)
    ############################################
    - name: Download Qt6 Host SDK Artifact
      uses: actions/download-artifact@v4
      with:
        name: qt6-host-sdk
        path: .

    - name: Extract Qt6 Host SDK
      run: |
        set -e
        mkdir -p ${QT_HOST_DIR}
        tar -I zstd -xf qt6-host-sdk.tar.zst -C ${QT_HOST_DIR}
        echo "QT_HOST_PATH=${QT_HOST_DIR}/qt-host-sdk" >> $GITHUB_ENV

    ############################################
    # CROSS BUILD Qt + Hyperion
    ############################################
    - name: Build Hyperion (WebOS Qt6)
      run: |
        set -e

        mkdir -p ${BUILD_DIR}
        cd ${BUILD_DIR}

        cmake ../hyperion.ng \
          -G Ninja \
          -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
          -DCMAKE_C_COMPILER_LAUNCHER=ccache \
          -DQt6_DIR=${SYSROOT}/usr/local/qt6/lib/cmake/Qt6 \
          -DQT_HOST_PATH=${QT_HOST_PATH} \
          -DENABLE_QT=ON \
          -DENABLE_DEV_SERIAL=ON \
          -DENABLE_MDNS=ON \
          -DENABLE_EFFECTENGINE=ON

        cmake --build . --parallel $(nproc)

    ############################################
    # PACKAGE ARTIFACT
    ############################################
    - name: Package release
      run: |
        rm -rf release
        mkdir -p release

        cp -r ${BUILD_DIR}/bin/* release/ || true

    ############################################
    # UPLOAD ARTIFACT
    ############################################
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: hyperion-webos-build
        path: release
