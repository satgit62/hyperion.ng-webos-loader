name: Hyperion webOS Qt6 FINAL CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_ENV_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/environment-setup
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake

  SYSROOT: /opt/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot
  QT_PREFIX: /opt/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot/usr/local/qt6

  BUILD_DIR: build
  RELEASE_DIR: release

jobs:

# =========================================================
# TOOLCHAIN
# =========================================================
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Hyperion
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            build-essential cmake ninja-build git perl python3 pkg-config ccache \
            libegl1-mesa-dev libgles2-mesa-dev

      # -----------------------------------------------------
      # TOOLCHAIN CACHE
      # -----------------------------------------------------
      - name: Cache toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: webos-toolchain

      - name: Download toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          cd /opt
          wget -q -O toolchain.tar.gz "${TOOLCHAIN_URL}"
          sudo tar xf toolchain.tar.gz
          cd ${TOOLCHAIN_DIR}
          sudo ./relocate-sdk.sh

      - name: Fix toolchain
        run: |
          find ${TOOLCHAIN_DIR}/bin -iname "perl*" -delete

# =========================================================
# BUILD QT6 (WEBOS)
# =========================================================
      - name: Build Qt6
        run: |
          source ${TOOLCHAIN_ENV_FILE}

          git clone https://code.qt.io/qt/qt5.git qt6
          cd qt6
          git checkout v6.8.3
          perl init-repository --module-subset=qtbase

          mkdir build && cd build

          ../qtbase/configure \
            -release \
            -prefix ${QT_PREFIX} \
            -sysroot ${SYSROOT} \
            -platform linux-g++ \
            -device linux-webos-g++ \
            -device-option CROSS_COMPILE=${TOOLCHAIN_DIR}/bin/arm-webos-linux-gnueabi- \
            -opengl es2 \
            -gui -widgets -network -sql-sqlite \
            -no-dbus -no-icu \
            -nomake tests -nomake examples \
            -qt-host-path /opt/qt6-host \
            -- -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE}

          cmake --build . --parallel
          cmake --install .

# =========================================================
# BUILD HYPERION
# =========================================================
      - name: Build Hyperion
        run: |
          source ${TOOLCHAIN_ENV_FILE}

          mkdir -p ${BUILD_DIR}
          cd ${BUILD_DIR}

          cmake .. \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_PREFIX_PATH=${QT_PREFIX} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DPython3_EXECUTABLE=${TOOLCHAIN_DIR}/bin/python3 \
            -DENABLE_QT=ON \
            -DENABLE_EFFECTENGINE=ON \
            -DENABLE_AUDIO=OFF \
            -G Ninja

          cmake --build .

# =========================================================
# RUNTIME PREPARATION (IMPORTANT FIXES)
# =========================================================
      - name: Prepare release folder
        run: |
          rm -rf ${RELEASE_DIR}
          mkdir -p ${RELEASE_DIR}

          cp ${BUILD_DIR}/bin/* ${RELEASE_DIR}/

          # Qt6 libs
          cp ${QT_PREFIX}/lib/libQt6Core.so* ${RELEASE_DIR}/
          cp ${QT_PREFIX}/lib/libQt6Gui.so* ${RELEASE_DIR}/
          cp ${QT_PREFIX}/lib/libQt6Network.so* ${RELEASE_DIR}/
          cp ${QT_PREFIX}/lib/libQt6Widgets.so* ${RELEASE_DIR}/

          # Qt6 plugins (CRITICAL FIX)
          mkdir -p ${RELEASE_DIR}/plugins/{platforms,imageformats,sqldrivers}

          cp ${QT_PREFIX}/plugins/platforms/libqlinuxfb.so ${RELEASE_DIR}/plugins/platforms/ || true
          cp ${QT_PREFIX}/plugins/imageformats/libqjpeg.so ${RELEASE_DIR}/plugins/imageformats/ || true
          cp ${QT_PREFIX}/plugins/sqldrivers/libqsqlite.so ${RELEASE_DIR}/plugins/sqldrivers/ || true

# =========================================================
# AUTOSTART SCRIPT (WEBOS FIX)
# =========================================================
      - name: Create autostart script
        run: |
          cat <<EOF > ${RELEASE_DIR}/start_hyperiond.sh
          #!/bin/sh

          export LD_LIBRARY_PATH=\$(dirname \$0)
          export QT_QPA_PLATFORM=linuxfb
          export QT_PLUGIN_PATH=\$(dirname \$0)/plugins

          exec \$(dirname \$0)/hyperiond
          EOF

          chmod +x ${RELEASE_DIR}/start_hyperiond.sh

# =========================================================
# IPK PACKAGING
# =========================================================
      - name: Create IPK
        run: |
          mkdir -p ipk/CONTROL
          mkdir -p ipk/usr/bin/hyperion

          cp -r ${RELEASE_DIR}/* ipk/usr/bin/hyperion/

          cat <<EOF > ipk/CONTROL/control
          Package: hyperion
          Version: 1.0.0
          Architecture: armv7
          Maintainer: Hyperion Project
          Description: Hyperion NG Qt6 for webOS
          EOF

          dpkg-deb --build ipk hyperion-webos.ipk

# =========================================================
# ARTIFACTS
# =========================================================
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: hyperion-webos-qt6
          path: |
            hyperion-webos.ipk
            release/
