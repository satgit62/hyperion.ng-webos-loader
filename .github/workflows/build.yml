name: WebOS build (Qt6 Lean)
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_ENV_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/environment-setup
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  BUILD_DIR: build
  CCACHE_CACHE_DIR: .ccache-build
  QT_VERSION: "6.8.3"

jobs:
  build_hyperion_ng:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout hyperion.ng
        uses: actions/checkout@v4
        with:
          repository: hyperion-project/hyperion.ng
          ref: master
          path: hyperion.ng
          submodules: recursive

      - name: Install native dependencies
        run: |
          sudo apt update
          sudo apt install -y ccache git cmake build-essential flatbuffers-compiler ninja-build wget libdbus-1-dev

      - name: Set up Environment
        run: |        
          echo "QT_TOOLCHAIN_DIR=$TOOLCHAIN_DIR/qt6-host" >> $GITHUB_ENV
          echo "SYSROOT=$TOOLCHAIN_DIR/arm-webos-linux-gnueabi/sysroot" >> $GITHUB_ENV

      - name: Cache toolchain dir
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: ${{ env.TOOLCHAIN_DIR }}
          key: ${{ runner.os }}-toolchain-qt-${{ env.QT_VERSION }}-${{ hashFiles('**/workflow.yml') }}

      - name: Download and unpack toolchain      
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          sudo mkdir -p /opt
          sudo chown $USER /opt
          cd /opt
          wget -q -O toolchain.tar.gz ${{ env.TOOLCHAIN_URL }}
          tar xf toolchain.tar.gz
          cd ${{ env.TOOLCHAIN_DIR }}
          ./relocate-sdk.sh

      - name: "Build QT6 (Host & Cross)"
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/qt_build
          git clone --branch v${QT_VERSION} --depth 1 https://github.com/qt/qtbase.git /opt/qt_build/qt_source
          
          # --- 1. HOST BUILD (Minimal für Tools, ohne OpenGL & X11 Tests) ---
          mkdir -p /opt/qt_build/host && cd /opt/qt_build/host
          cmake /opt/qt_build/qt_source \
            -DCMAKE_INSTALL_PREFIX=${{ env.QT_TOOLCHAIN_DIR }} \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_FEATURE_dbus=ON \
            -DQT_FEATURE_gui=ON \
            -DQT_FEATURE_widgets=ON \
            -DQT_FEATURE_network=ON \
            -DQT_FEATURE_opengl=OFF \
            -DQT_FEATURE_png=ON \
            -DQT_FEATURE_jpeg=ON \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            -DQT_FEATURE_xcb=OFF \
            -DQT_FEATURE_xlib=OFF \
            -DFEATURE_egl=OFF \
            -DFEATURE_glx=OFF \
            -GNinja
          ninja install


          # --- 2. CROSS BUILD PREPARATION ---
          cd /opt/qt_build/qt_source
          mkdir -p mkspecs/devices/linux-webos-g++
          cp -r ${{ env.TOOLCHAIN_DIR }}/mkspecs/devices/linux-buildroot-g++ mkspecs/devices/linux-webos-g++
          sed -i '1i#define EM_AARCH64 183' src/corelib/plugin/qelfparser_p.cpp
          
          # --- 3. CROSS BUILD (ARMv7) ---
          mkdir -p /opt/qt_build/base_cross && cd /opt/qt_build/base_cross
          cmake /opt/qt_build/qt_source \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
            -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} \
            -DCMAKE_INSTALL_PREFIX=/usr/local/qt6 \
            -DCMAKE_STAGING_PREFIX=${{ env.SYSROOT }}/usr/local/qt6 \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            -DQT_FEATURE_dbus=ON \
            -DQT_FEATURE_gui=ON \
            -DQT_FEATURE_widgets=ON \
            -DQT_FEATURE_sql=ON \
            -DFEATURE_sql_sqlite=ON \
            -DQT_FEATURE_opengl=OFF \
            -GNinja
          ninja install

          # --- 4. ADD-ON MODULES ---
          for mod in qtserialport qtwebsockets qtimageformats; do
            echo "Building module: $mod"
            # Korrigierte URL:
            git clone --branch v${QT_VERSION} --depth 1 https://github.com{mod}.git /opt/qt_build/$mod
            mkdir -p /opt/qt_build/$mod/build && cd /opt/qt_build/$mod/build
            cmake .. \
              -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
              -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} \
              -DCMAKE_PREFIX_PATH=${{ env.SYSROOT }}/usr/local/qt6 \
              -DCMAKE_INSTALL_PREFIX=/usr/local/qt6 \
              -DCMAKE_STAGING_PREFIX=${{ env.SYSROOT }}/usr/local/qt6 \
              -GNinja
            ninja install
          done

      - name: "Build Hyperion.ng"
        run: |
          mkdir -p hyperion.ng/${{ env.BUILD_DIR }}
          cd hyperion.ng/${{ env.BUILD_DIR }}
          cmake .. \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_TOOLCHAIN_FILE=${{ env.TOOLCHAIN_FILE }} \
                -DQT_HOST_PATH=${{ env.QT_TOOLCHAIN_DIR }} \
                -DCMAKE_PREFIX_PATH="${{ env.SYSROOT }}/usr/local/qt6" \
                -DBUILD_TESTS=OFF \
                -DPLATFORM=rpi \
                -DENABLE_QT=ON \
                -DENABLE_AUDIO=OFF \
                -DENABLE_EFFECTENGINE=ON \
                -DENABLE_JSONCHECKS=ON \
                -DENABLE_MDNS=ON \
                -DENABLE_DEPLOY_DEPENDENCIES=OFF \
                -GNinja
          ninja
          
          # Staging für Upload
          DESTDIR=./output_staging ninja install
          mkdir -p ./output_staging/usr/local/share/hyperion/lib
          cp -P ${{ env.SYSROOT }}/usr/local/qt6/lib/libQt6*.so* ./output_staging/usr/local/share/hyperion/lib/ || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: hyperion.ng-webos-binaries
          path: hyperion.ng/${{ env.BUILD_DIR }}/output_staging/*
