name: WebOS build

on:
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

env:
  TOOLCHAIN_URL: https://github.com/satgit62/buildroot-nc4/releases/download/webOS.0.1/arm-webos-linux-gnueabi_sdk-buildroot.tar.gz
  TOOLCHAIN_DIR: /opt/arm-webos-linux-gnueabi_sdk-buildroot
  TOOLCHAIN_FILE: /opt/arm-webos-linux-gnueabi_sdk-buildroot/share/buildroot/toolchainfile.cmake
  SYSROOT: /opt/arm-webos-linux-gnueabi_sdk-buildroot/arm-webos-linux-gnueabi/sysroot

  QT_VERSION: 6.8.3
  QT_HOST_PREFIX: /opt/qt6-host

  BUILD_DIR: build

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # =========================
      # TOOLCHAIN
      # =========================
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y git cmake ninja-build build-essential wget ccache

      - name: Download toolchain
        run: |
          set -e
          cd /opt
          wget -O toolchain.tar.gz $TOOLCHAIN_URL
          tar xf toolchain.tar.gz

      - name: Setup env
        run: |
          echo "QT_HOST_PREFIX=$QT_HOST_PREFIX" >> $GITHUB_ENV
          echo "PATH=$QT_HOST_PREFIX/bin:$PATH" >> $GITHUB_ENV

      # =========================
      # QT HOST (STABLE SDK)
      # =========================
      - name: Build Qt6 Host SDK
        run: |
          set -e

          rm -rf qt-host qt-host-build /opt/qt6-host
          mkdir qt-host-build && cd qt-host-build

          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qtbase.git qtbase
          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qttools.git qttools

          cmake -S qtbase -B build-base \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${QT_HOST_PREFIX} \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            -DQT_BUILD_TOOLS_BY_DEFAULT=ON \
            -DQT_FEATURE_opengl=off \
            -DINPUT_opengl=no

          cmake --build build-base --parallel $(nproc)
          cmake --install build-base

          export Qt6_DIR=${QT_HOST_PREFIX}/lib/cmake/Qt6
          export PATH=${QT_HOST_PREFIX}/bin:$PATH

          cmake -S qttools -B build-tools \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${QT_HOST_PREFIX} \
            -DQt6_DIR=${QT_HOST_PREFIX}/lib/cmake/Qt6

          cmake --build build-tools --parallel $(nproc)
          cmake --install build-tools

      # =========================
      # QT TARGET (WEBOS CROSS)
      # =========================
      - name: Build Qt6 Target
        run: |
          set -e

          rm -rf qt-target qt-target-build
          mkdir qt-target-build && cd qt-target-build

          git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/qtbase.git qtbase

          cmake -S qtbase -B build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=${SYSROOT}/usr/local/qt6 \
            -DQT_HOST_PATH=${QT_HOST_PREFIX} \
            -DQT_BUILD_TESTS=OFF \
            -DQT_BUILD_EXAMPLES=OFF \
            -DQT_FEATURE_opengl=off \
            -DINPUT_opengl=no \
            -DCMAKE_DISABLE_FIND_PACKAGE_OpenGL=ON

          cmake --build build --parallel $(nproc)
          cmake --install build

      # =========================
      # QT MODULES
      # =========================
      - name: Build Qt Modules (WebSockets + SerialPort)
        run: |
          set -e

          export Qt6_DIR=${SYSROOT}/usr/local/qt6/lib/cmake/Qt6

          for module in qtserialport qtwebsockets; do
            rm -rf $module $module-build

            git clone --depth 1 --branch v${QT_VERSION} https://github.com/qt/${module}.git

            cmake -S ${module} -B ${module}-build \
              -G Ninja \
              -DCMAKE_TOOLCHAIN_FILE=${TOOLCHAIN_FILE} \
              -DCMAKE_INSTALL_PREFIX=${SYSROOT}/usr/local/qt6 \
              -DQT_HOST_PATH=${QT_HOST_PREFIX} \
              -DQt6_DIR=${SYSROOT}/usr/local/qt6/lib/cmake/Qt6

            cmake --build ${module}-build --parallel $(nproc)
            cmake --install ${module}-build
          done

      # =========================
      # ARTIFACT
      # =========================
      - name: Package Qt Host SDK
        run: |
          tar -I 'zstd -19' -cf qt6-host-sdk.tar.zst ${QT_HOST_PREFIX}

      - uses: actions/upload-artifact@v4
        with:
          name: qt6-host-sdk
          path: qt6-host-sdk.tar.zst

      - name: Upload build result
        uses: actions/upload-artifact@v4
        with:
          name: webos-build
          path: |
            ${SYSROOT}/usr/local/qt6
